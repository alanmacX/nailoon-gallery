<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>奶龙素材馆 | 人格测试</title>
  <link rel="icon" href="https://image.hakimi.uno/images/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="simple-page">
  <header class="site-header glass">
    <a class="logo" href="index.html">
      <span class="logo-mark">N</span>
      <span>奶龙素材馆</span>
    </a>
    <nav class="nav">
      <a href="index.html">首页</a>
      <a href="category.html">分类</a>
      <a href="detail.html">收藏</a>
      <a href="word.html">奶龙组词</a>
      <a class="active" href="contact.html">测试</a>
      <a href="smile.html">大笑</a>
      <a href="login.html">登录</a>
    </nav>
    <div class="user-pill">你好，<span id="currentUser">游客</span></div>
  </header>

  <main class="contact-layout section-shell test-layout">
    <section class="form-card glass">
      <h1>测测你是哪只奶龙。</h1>
      <form id="personalityForm" novalidate>
        <label for="testName">昵称</label>
        <input id="testName" name="testName" type="text" placeholder="请输入你的昵称">
        <span class="error" id="testNameError"></span>

        <label for="moodChoice">路过遇到一只奶龙，你会怎么做</label>
        <select id="moodChoice" name="moodChoice">
          <option value="">请选择</option>
          <option value="happy">打死</option>
          <option value="quiet">抱一下</option>
          <option value="hungry">大喊</option>
          <option value="lazy">踢一脚</option>
        </select>
        <span class="error" id="moodChoiceError"></span>

        <label for="colorChoice">最想带走的颜色</label>
        <select id="colorChoice" name="colorChoice">
          <option value="">请选择</option>
          <option value="yellow">奶黄色</option>
          <option value="green">清新绿</option>
          <option value="blue">天空蓝</option>
          <option value="pink">珊瑚粉</option>
        </select>
        <span class="error" id="colorChoiceError"></span>

        <label for="snackChoice">如果奶龙请客</label>
        <select id="snackChoice" name="snackChoice">
          <option value="">请选择</option>
          <option value="milk">喝奶</option>
          <option value="fruit">吃水果</option>
          <option value="cake">吃蛋糕</option>
          <option value="sleep">先睡觉</option>
        </select>
        <span class="error" id="snackChoiceError"></span>

        <button class="btn primary full" type="submit">生成我的奶龙</button>
      </form>
    </section>

    <aside class="test-result glass" id="testResult">
      <img id="testResultImage" src="https://image.hakimi.uno/images/photos/奶/图片00001.jpg" alt="测试结果奶龙">
      <h3 id="testResultTitle">等待生成</h3>
    </aside>
  </main>

  <script src="js/main.js?v=1.0.3"></script>
</body>

</html>

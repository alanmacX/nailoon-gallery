<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>奶龙素材馆 | 心理测试</title>
  <link rel="icon" href="https://image.hakimi.uno/images/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="simple-page">
  <header class="site-header glass">
    <a class="logo" href="index.html">
      <span class="logo-mark">N</span>
      <span>奶龙素材馆</span>
    </a>
    <nav class="nav">
      <a href="index.html">首页</a>
      <a href="category.html">分类</a>
      <a href="collection.html">收藏</a>
      <a href="word.html">奶龙组词</a>
      <a class="active" href="contact.html">测试</a>
      <a href="smile.html">大笑</a>
      <a href="login.html">登录</a>
    </nav>
    <div class="user-pill">你好，<span id="currentUser">游客</span></div>
  </header>

  <!-- 开始前的提示 -->
  <div id="quizIntro" class="quiz-intro">
    <div class="form-card glass" style="max-width:420px;text-align:center;">
      <h1 style="font-size:28px;">奶龙心理研究所</h1>
      <p style="margin:16px 0;">本问卷共 10 题，请根据直觉作答。</p>
      <p class="quiz-warn">提示：包含微恐交互效果，介意请返回。</p>
      <button class="btn primary full" id="quizStartBtn" type="button">开始作答</button>
    </div>
  </div>

  <!-- 答题区域 -->
  <div id="quizBox" class="quiz-box" style="display:none;">
    <div class="form-card glass quiz-card">
      <div class="quiz-progress" id="quizProgress">第 1 题 / 共 10 题</div>
      <div class="quiz-question" id="quizQuestion"></div>
      <div class="quiz-options" id="quizOptions"></div>
      <div class="quiz-btns">
        <button class="btn secondary" id="quizPrev" type="button">上一题</button>
        <button class="btn primary" id="quizNext" type="button">下一题</button>
      </div>
    </div>
  </div>

  <!-- 解锁输入 -->
  <div id="quizUnlock" class="quiz-unlock" style="display:none;">
    <div class="form-card glass" style="max-width:380px;text-align:center;">
      <h2 style="margin:0 0 12px;">问卷已完成</h2>
      <p>输入指定文字查看你的奶龙</p>
      <form id="unlockForm" novalidate style="margin-top:18px;">
        <input id="unlockInput" type="text" placeholder="请输入：奶龙我爱你">
        <span class="error" id="unlockError"></span>
        <button class="btn primary full" type="submit">解锁</button>
      </form>
    </div>
  </div>

  <!-- 结果展示 -->
  <div id="quizResult" class="quiz-result" style="display:none;">
    <div class="form-card glass" style="max-width:460px;text-align:center;">
      <h2 id="quizResultTitle" style="margin:0;">正在生成...</h2>
      <img id="quizResultImg" src="" alt="你的奶龙" style="margin:18px auto;max-height:360px;border-radius:20px;">
      <a class="btn primary" href="contact.html">再测一次</a>
    </div>
  </div>

  <script src="js/main.js?v=1.0.9"></script>
</body>

</html>
